<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>undefined | Specialty Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo">undefined</a>
        <div class="nav-links">
            <a href="#">Our Beans</a>
            <a href="#">Menu</a>
            <a href="#">Locations</a>
        </div>
    </nav>
    <section class="hero">
        <div>
            <h1>Brewed for<br>the Bold.</h1>
            <p style="font-size: 1.2rem; margin-bottom: 2rem; max-width: 400px;">Artisan coffee roasted daily. Experience the rich, complex flavors of our single-origin beans.</p>
            <a href="#" style="background: var(--primary); color: white; padding: 1rem 2rem; text-decoration: none; border-radius: 30px; font-weight: bold;">View Menu</a>
        </div>
        <div class="polaroid">
            <img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?auto=format&fit=crop&w=800&q=80">
        </div>
    </section>
    <section class="grid-menu">
        <div class="menu-item">
            <img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&w=300&q=80">
            <h3>Espresso</h3>
            <p>$3.50</p>
        </div>
        <div class="menu-item">
            <img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&w=300&q=80">
            <h3>Pour Over</h3>
            <p>$5.00</p>
        </div>
        <div class="menu-item">
            <img src="https://images.unsplash.com/photo-1572442388796-11668a67e53d?auto=format&fit=crop&w=300&q=80">
            <h3>Cold Brew</h3>
            <p>$4.50</p>
        </div>
    </section>

    <!-- RWD Mobile Fixes & Hamburger Menu -->
    <style>
        .mobile-menu-btn { display: none; position: fixed; top: 20px; right: 20px; z-index: 10000; background: var(--primary, #000); color: #fff; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); align-items: center; justify-content: center; }
        .mobile-offcanvas { position: fixed; top: 0; right: -100%; width: 280px; height: 100vh; background: var(--bg, #fff); z-index: 9999; padding: 6rem 2rem; transition: right 0.4s cubic-bezier(0.77,0.2,0.05,1); box-shadow: -10px 0 30px rgba(0,0,0,0.2); border-left: 1px solid rgba(128,128,128,0.2); }
        .mobile-offcanvas.open { right: 0; }
        .mobile-offcanvas a { display: block; font-size: 1.5rem; color: var(--text, #000); text-decoration: none; margin-bottom: 2rem; font-family: var(--font-heading, sans-serif); text-transform: uppercase; letter-spacing: 2px; }
        @media (max-width: 768px) {
            .mobile-menu-btn { display: flex; }
            .navbar > div:not(.logo), .navbar ul, .nav-links, .collapse.navbar-collapse { display: none !important; }
            .side-nav { width: 100%; height: 80px; flex-direction: row; padding: 0 20px; border-bottom: 1px solid rgba(255,255,255,0.1); border-right: none; }
            .side-nav .logo { writing-mode: horizontal-tb; transform: none; }
            .side-nav > div, .side-nav .hamburger { display: none; }
            .main-wrapper { margin-left: 0; margin-top: 80px; }
            
            /* Layout fallbacks */
            h1 { font-size: 3rem !important; }
            .hero-fs h1, .hero h1 { font-size: 3.5rem !important; line-height: 1.1 !important; }
            .hero-content h1 { font-size: 3rem !important; }
            .split-hero { flex-direction: column; height: auto; }
            .split-left, .split-right { width: 100%; }
            .split-left { padding: 4rem 2rem; }
            .split-right { height: 400px; }
            .grid-section, .hero-grid { grid-template-columns: 1fr !important; }
            .bento-grid, .grid-2, .services-grid, .programs, .grid-menu { display: flex !important; flex-direction: column !important; gap: 2rem !important; }
            .masonry { column-count: 1 !important; }
            .bento-box { grid-column: auto !important; grid-row: auto !important; height: auto !important; min-height: 250px; }
            .parallax-hero { background-attachment: scroll !important; }
            .hero { padding: 4rem 2rem; flex-direction: column; }
            .hero-bg, .organic-bg, .hero-glow { display: none; }
            .polaroid { transform: none; margin-top: 2rem; }
            .arch-image-container { height: 400px; margin-top: 3rem; }
            .floating-badge { width: 100px; height: 100px; bottom: 10px; left: -10px; }
        }
    </style>
    <button class="mobile-menu-btn" onclick="document.getElementById('mobMenu').classList.toggle('open')">☰</button>
    <div id="mobMenu" class="mobile-offcanvas">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact</a>
    </div>

</body>
</html>
